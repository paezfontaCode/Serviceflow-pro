[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True
no_strict_optional = True

# SQLAlchemy dynamic attributes
disable_error_code = attr-defined

# Excluir directorios
exclude = 
    (?x)(
        ^alembic/
        | ^tests/
        | __pycache__
        | \.venv
        | venv
    )

[mypy-app.models.*]
# Ignorar errores de tipos dinámicos en modelos SQLAlchemy
disable_error_code = assignment, misc

[mypy-app.schemas.*]
# Pydantic schemas pueden tener tipos dinámicos
disable_error_code = assignment

[mypy-alembic.*]
ignore_errors = True
