services:
  db:
    image: postgres:15-alpine
    container_name: serviceflow-db
    environment:
      - POSTGRES_USER=serviceflow
      - POSTGRES_PASSWORD=serviceflow_pass
      - POSTGRES_DB=serviceflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: serviceflow-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/venv
    environment:
      - DATABASE_URL=postgresql://serviceflow:serviceflow_pass@db:5432/serviceflow_db
      - SECRET_KEY=your-secret-key-here
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: serviceflow-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    restart: always

volumes:
  postgres_data:
